    <p style="max-width:56ch;">A quick reference for the six material categories GreenSort AI recognises.</p>

  <div class="container cat-grid" id="catGrid"></div>
</section>

  <div class="container">

<script src="data.js"></script>
<script src="main.js"></script>
<script>
  const CATEGORIES = [
    { key: "plastic", icon: "🧴", color: "var(--plastic)", desc: "Synthetic polymers found in bottles, packaging, and containers.", disposal: "Rinse and sort by resin code; check local acceptance for soft plastics.", fact: "Only ~9% of all plastic ever made has been recycled.", impact: "Takes 20–500 years to degrade in landfill." },
    { key: "paper", icon: "📦", color: "var(--paper-mat)", desc: "Cardboard, newspaper, office paper, and cartons.", disposal: "Keep dry and free of food grease; flatten boxes to save space.", fact: "Recycled paper uses 60% less energy than making it from raw pulp.", impact: "One tonne of recycled paper saves ~17 trees." },
    { key: "glass", icon: "🍾", color: "var(--glass)", desc: "Jars, bottles, and glass packaging.", disposal: "Rinse, remove lids, sort by colour if required locally.", fact: "Glass can be recycled endlessly without losing quality.", impact: "Cuts related air pollution by up to 20% vs. new glass." },
    { key: "metal", icon: "🥫", color: "var(--metal)", desc: "Aluminium and steel cans, foil, and small metal items.", disposal: "Rinse and crush cans; keep foil balled and clean.", fact: "Aluminium recycling uses 95% less energy than virgin production.", impact: "A recycled can can be back on shelves in ~60 days." },
    { key: "organic", icon: "🍌", color: "var(--organic)", desc: "Food scraps, garden waste, and other biodegradables.", disposal: "Compost at home or use municipal organic collection — never bag in plastic.", fact: "Food waste makes up ~24% of landfill methane emissions.", impact: "Composting returns nutrients to soil instead of emitting methane." },
    { key: "ewaste", icon: "🔋", color: "var(--hazard)", desc: "Batteries, electronics, and other hazardous items.", disposal: "Never bin with household waste — use certified e-waste drop-off points.", fact: "E-waste is the fastest-growing waste stream in the world.", impact: "Improper disposal leaches heavy metals into soil and water." }
  ];

  const grid = document.getElementById("catGrid");
  grid.innerHTML = CATEGORIES.map(c => `
    <div class="cat-card" style="border-top-color:${c.color};">
      <div style="font-size:1.8rem; margin-bottom:10px;">${c.icon}</div>
      <h3>${MATERIAL_LABELS[c.key]}</h3>
      <p>${c.desc}</p>
      <p><strong style="color:var(--text);">Disposal:</strong> ${c.disposal}</p>
      <p><strong style="color:var(--text);">Fact:</strong> ${c.fact}</p>
      <p><strong style="color:var(--text);">Impact:</strong> ${c.impact}</p>
      <div class="hero-actions">
        <button class="btn btn-outline btn-sm" onclick="alert('Full guide coming soon — this is a hackathon MVP!')">📖 Read More</button>
      </div>
    </div>
  `).join("");
</script>
